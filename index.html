<style>

    --text: #e2e8f0; --dim: #64748b; --accent: #38bdf8;
    --green: #4ade80; --yellow: #facc15; --red: #f87171;

  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; }

  .date-nav button {
    background:var(--card); color:var(--text); border:1px solid var(--border);

  .date-nav button:hover { border-color:var(--accent); }
  .date-nav button.active { background:var(--accent); color:#000; font-weight:bold; }
  .section-title { font-size:0.9rem; color:var(--dim); margin:12px 0 8px; }

  .team .name { font-size:1.2rem; font-weight:700; }
  .team .rank { font-size:0.78rem; color:var(--dim); }
  .vs { color:var(--dim); font-weight:700; font-size:1.1rem; }
  .match-meta { text-align:center; color:var(--dim); font-size:0.82rem; margin:6px 0; }

  .result-box .score { font-size:1.8rem; font-weight:800; letter-spacing:3px; }
  .result-box .winner { color:var(--green); font-size:0.9rem; margin-top:4px; }

  .prob-bar .bar-fill { height:100%; border-radius:9px; }
  .prob-bar .bar-pct { width:50px; font-size:0.82rem; font-weight:600; text-align:right; }
  .bar-green .bar-fill { background:linear-gradient(90deg,#166534,#4ade80); }

  .xg-row .xg-val { font-size:1.3rem; font-weight:700; color:var(--accent); }
  .top-scores { display:flex; gap:8px; justify-content:center; margin:10px 0; flex-wrap:wrap; }

  .verdict.win { color:var(--green); background:rgba(74,222,128,0.06); }
  .verdict.close { color:var(--yellow); background:rgba(250,204,21,0.06); }

  .empty-state { text-align:center; padding:50px; color:var(--dim); }

  .modal-overlay.show { display:flex; }
  .modal { background:var(--card); border-radius:18px; padding:24px; max-width:520px; width:100%; border:1px solid var(--border); max-height:90vh; overflow-y:auto; position:relative; }
  .modal .close { position:absolute; top:12px; right:16px; background:none; border:none; color:var(--dim); font-size:1.5rem; cursor:pointer; }

  .modal .m-name { font-size:1.4rem; font-weight:700; }
  .modal .m-rank { font-size:0.85rem; color:var(--dim); }
  .modal .m-vs { color:var(--dim); font-weight:700; }
  .modal .m-meta { text-align:center; color:var(--dim); font-size:0.85rem; margin:8px 0; }

    .header h1 { font-size:1.3rem; }
    .match-card { padding:12px 10px; }
    .team .name { font-size:1rem; }
    .round-col { min-width:140px; }

const LEAGUE_AVG = 1.38, MAX_G = 7;

function toElo(r) { return Math.round(2170 - (r - 1) * 4.2); }
function poissonPmf(k, lam) {
  if (k < 0 || lam <= 0) return k === 0 ? 1 : 0;
  let lp = -lam + k * Math.log(lam);
  for (let i = 2; i <= k; i++) lp -= Math.log(i);
  return Math.exp(lp);
}

  const pa = Array.from({length:MAX_G+1},(_,i)=>poissonPmf(i,lamA));
  const scores = []; let win = 0, draw = 0;
  for (let i=0;i<=MAX_G;i++) for (let j=0;j<=MAX_G;j++) {
    const p = ph[i]*pa[j]; scores.push({s:`${i}-${j}`,p});
    if (i>j) win+=p; else if (i===j) draw+=p;
  }
  const lose = Math.max(0, 1-win-draw), top3 = scores.sort((a,b)=>b.p-a.p).slice(0,3);
  const wp=(win*100).toFixed(1), dp=(draw*100).toFixed(1), lp=(lose*100).toFixed(1);
  let v,t,c;
  if (wp>lp+5) { v=`🏆 ${home} 赢面更大`; c='win'; }
  else if (lp>wp+5) { v=`🏆 ${away} 赢面更大`; c='win'; }
  else if (dp>Math.max(wp,lp)) { v='🤝 平局可能最大, 或进加时'; c='close'; }
  else { v='⚖️ 势均力敌'; c='close'; }
  return {home,away,eH,eA,eDiff:eH-eA,rH,rA,wp,dp,lp,xgH:lamH.toFixed(2),xgA:lamA.toFixed(2),totalXg:(lamH+lamA).toFixed(2),top3:top3.map(x=>({s:x.s,p:(x.p*100).toFixed(2)})),verdict:{text:v,cls:c}};
}

function bjToday() {
  const d = new Date(Date.now() + 8*3600000);
  const p = n => String(n).padStart(2,'0');
  return `${d.getUTCFullYear()}-${p(d.getUTCMonth()+1)}-${p(d.getUTCDate())}`;
}

function formatDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  const w = ['周日','周一','周二','周三','周四','周五','周六'];
  return { full:s, wd:w[new Date(y,m-1,d).getDay()], m, d };
}

function getMatches(dateStr) {
  // 收集所有比赛: R32 + 淘汰赛
  const all = [];

  // R32
  for (const m of R32) {
    const dd = `2026-${m.date}`;
    all.push({...m, dateFull: dd, done:!!m.score, round:'R32'});
  }

  // 淘汰赛 (动态计算对阵)
  const r32Res = R32.map(m => ({ winner: getWinner(m), loser: getLoser(m) }));
  const R16_P = [[0,2],[1,5],[3,4],[6,7],[10,11],[8,9],[14,13],[12,15]];
  const r16 = R16_P.map(([i,j], idx) => {
    const sched = KNOCKOUT.r16[idx];
    const result = R16_RESULTS[idx] || {};
    return {
      id: sched.id, date: sched.date, time: sched.time, venue: sched.venue,
      home: r32Res[i].winner || '待定', away: r32Res[j].winner || '待定',
      score: result.score || null, winner: result.winner || null,
      round: 'R16',
    };
  });

  const r16Winners = r16.map(m => getWinner(m));
  const QF_P2 = [[0,1],[2,3],[4,5],[6,7]];
  const qf = QF_P2.map(([i,j], idx) => {
    const sched = KNOCKOUT.qf[idx];
    const result = QF_RESULTS[idx] || {};
    return {
      id: sched.id, date: sched.date, time: sched.time, venue: sched.venue,
      home: r16Winners[i] || '待定', away: r16Winners[j] || '待定',
      score: result.score || null, winner: result.winner || null,
      round: 'QF',
    };
  });

  // SF 动态计算
  const qfWinners = qf.map(m => getWinner(m));
  const sfMatches = [[0,1],[2,3]].map(([i,j], idx) => {
    const sched = KNOCKOUT.sf[idx];
    return {
      id: sched.id, date: sched.date, time: sched.time, venue: sched.venue,
      home: qfWinners[i] || '待定', away: qfWinners[j] || '待定',
      score: null, winner: null, round: 'SF',
    };
  });

  // 添加到 all
  for (const m of [...r16, ...qf, ...sfMatches]) {
    if (m.date) {
      const dd = `2026-${m.date}`;
      all.push({...m, dateFull: dd, done:!!m.score});
    }
  }

  // 半决赛 & 决赛 (暂无具体对阵，只展示赛程卡片)
  for (const s of KNOCKOUT.sf) {
    if (s.date) {
      all.push({
        id: s.id, date: s.date, time: s.time, venue: s.venue,
        home:'待定', away:'待定', score:null, winner:null,
        dateFull: `2026-${s.date}`, done:false, round:'SF',
      });
    }
  }
  if (KNOCKOUT.final.date) {
    all.push({
      id: KNOCKOUT.final.id, date: KNOCKOUT.final.date, time: KNOCKOUT.final.time,
      venue: KNOCKOUT.final.venue,
      home:'待定', away:'待定', score:null, winner:null,
      dateFull: `2026-${KNOCKOUT.final.date}`, done:false, round:'FINAL',
    });
  }
  if (KNOCKOUT.third.date) {
    all.push({
      id: KNOCKOUT.third.id, date: KNOCKOUT.third.date, time: KNOCKOUT.third.time,
      venue: KNOCKOUT.third.venue,
      home:'待定', away:'待定', score:null, winner:null,
      dateFull: `2026-${KNOCKOUT.third.date}`, done:false, round:'3RD',
    });
  }

  return all.filter(m => m.dateFull === dateStr);
}

// ================================================================
function getWinner(m) {
  if (!m) return null;
  if (m.winner) return m.winner;
  if (!m.score) return null;
  try {
    const s = m.score.replace(/\(点.*?\)/g,'').trim().split('-');
    const h=parseInt(s[0]), a=parseInt(s[1]);
    if (isNaN(h)||isNaN(a)) return null;
    return h>a ? m.home : a>h ? m.away : null;
  } catch(e) { return null; }
}

function getLoser(m) {
  const w = getWinner(m);
  if (!w) return null;
  return w === m.home ? m.away : m.home;
}

function getScoreParts(m) {
  if (!m || !m.score) return [null,null];
  try {
    const s = m.score.replace(/\(点.*?\)/g,'').trim().split('-');
    return [parseInt(s[0]), parseInt(s[1])];
  } catch(e) { return [null,null]; }
}

function bTeamRow(team, isW, score) {
  const f = FLAGS[team]||'🌍';
  return `<div class="b-team"><span class="b-flag">${f}</span><span class="b-name">${team}</span>${score!==undefined?`<span class="b-score ${isW?'w':'l'}">${score}</span>`:''}</div>`;
}

function bracketMatchBox(m, idx) {
  if (!m || (m.home==='待定' && m.away==='待定')) {
    return `<div class="b-match"><div class="b-tbd">待定</div></div>`;
  }
  const w = getWinner(m), done = !!m.score;
  const hW = w===m.home, aW = w===m.away;
  const [hs, as] = getScoreParts(m);
  const cls = done ? ' won' : (!m.home.includes('待定')&&!m.away.includes('待定') ? ' ready' : '');
  const onclick = (m.home!=='待定'||m.away!=='待定') ? ` onclick="openPrediction('${m.home}','${m.away}','${m.id||''}','${m.time||''}','${m.venue||''}','${m.score||''}')"` : '';
  const dateInfo = m.date ? `${m.date} ${m.time}` : '';
  return `<div class="b-match${cls}"${onclick}>
    ${bTeamRow(m.home, hW, hs)}${bTeamRow(m.away, aW, as)}
    ${!done && dateInfo ? `<div class="b-info"><span class="b-time">🕐 ${dateInfo}</span></div>` : ''}
    ${!done && !dateInfo && m.id ? `<div class="b-info"><span class="b-time">${m.id}</span></div>` : ''}
    ${done && m.score ? `<div class="b-info">${m.score}</div>` : ''}
  </div>`;
}

const BRACKET_LABELS = ['上半区','下半区','上半区','下半区'];

function renderBracket() {
  // ── Step 1: R32 results ──
  const r32Res = R32.map(m => ({ winner: getWinner(m), loser: getLoser(m), match: m, done: !!m.score }));

  // ── Step 2: Build R16 (dynamic from R32 winners) ──
  // 实际对阵: M73-M75, M74-M78, M76-M77, M79-M80, M83-M84, M81-M82, M87-M86, M85-M88
  const R16_P = [[0,2],[1,5],[3,4],[6,7],[10,11],[8,9],[14,13],[12,15]];
  const r16 = R16_P.map(([i,j], idx) => {
    const sched = KNOCKOUT.r16[idx];
    const result = R16_RESULTS[idx] || {};
    return {
      home: r32Res[i].winner || '待定', away: r32Res[j].winner || '待定',
      id: sched.id, date: sched.date, time: sched.time, venue: sched.venue,
      score: result.score || null, winner: result.winner || null,
    };
  });

  // ── Step 3: Build QF (dynamic from R16 winners) ──
  const QF_P = [[0,1],[2,3],[4,5],[6,7]];
  const r16Winners = r16.map(m => getWinner(m));
  const qf = QF_P.map(([i,j], idx) => {
    const sched = KNOCKOUT.qf[idx];
    const result = QF_RESULTS[idx] || {};
    return {
      home: r16Winners[i] || '待定', away: r16Winners[j] || '待定',
      id: sched.id, date: sched.date, time: sched.time, venue: sched.venue,
      score: result.score || null, winner: result.winner || null,
    };
  });

  // ── Step 4: Build SF (dynamic from QF winners) ──
  const qfWinners = qf.map(m => getWinner(m));
  const sf = [[0,1],[2,3]].map(([i,j], idx) => {
    const sched = KNOCKOUT.sf[idx];
    return {
      home: qfWinners[i] || '待定', away: qfWinners[j] || '待定',
      id: sched.id, date: sched.date, time: sched.time, venue: sched.venue,
      score: null,

  });

  // ── Step 5: Final & 3rd place (dynamic from SF winners) ──
  const final = { home:'待定', away:'待定', id:KNOCKOUT.final.id, date:KNOCKOUT.final.date, time:KNOCKOUT.final.time, venue:KNOCKOUT.final.venue, score:null };
  const third = { home:'待定', away:'待定', id:KNOCKOUT.third.id, date:KNOCKOUT.third.date, time:KNOCKOUT.third.time, venue:KNOCKOUT.third.venue, score:null };

  // ── Render ──
  let html = '<div class="bracket">';

  // R32 — 16 slots, flex=1 each

    html += `<div class="slot" style="flex:1">${bracketMatchBox(R32[i], i)}</div>`;
  }
  html += '</div>';

  // Connectors R32→R16: 8 pairs

  // R16 — 8 slots, flex=2 each (occupies same total height as 16 R32 slots)
  html += '<div class="round-col"><div class="round-label">16强 (7/4-8)</div>';
  html += '<div style="flex:0.5"></div>';
  for (let i = 0; i < r16.length; i++) {
    html += `<div class="slot" style="flex:2">${bracketMatchBox(r16[i], i)}</div>`;
  }
  html += '<div style="flex:0.5"></div>';
  html += '</div>';

  // Connectors R16→QF: 4 pairs
  html += renderConnectorCol(4);

  // QF — 4 slots, flex=4 each
  html += '<div class="round-col"><div class="round-label">¼决赛 (7/9-12)</div>';
  html += '<div style="flex:1"></div>';
  for (let i = 0; i < qf.length; i++) {
    html += `<div class="slot" style="flex:4">${bracketMatchBox(qf[i], i)}</div>`;
  }
  html += '<div style="flex:1"></div>';
  html += '</div>';

  // Connectors QF→SF: 2 pairs
  html += renderConnectorCol(2);

  // SF — 2 slots, flex=8 each
  html += '<div class="round-col"><div class="round-label">半决赛 (7/14-15)</div>';
  html += '<div style="flex:2"></div>';
  for (let i = 0; i < sf.length; i++) {
    html += `<div class="slot" style="flex:8">${bracketMatchBox(sf[i], i)}</div>`;
  }
  html += '<div style="flex:2"></div>';
  html += '</div>';

  // Connectors SF→Final: 1 pair
  html += renderConnectorCol(1);

  // Final + 3rd place
  html += '<div class="round-col wide"><div class="round-label final-label">🏆 决赛 7/19</div>';
  html += '<div style="flex:3"></div>';
  html += `<div class="slot" style="flex:16">${bracketMatchBox(final, 0)}</div>`;
  html += '<div style="flex:2"></div>';
  html += '<div style="text-align:center;color:var(--dim);font-size:0.75rem;padding:6px 0">🥉 三四名决赛 7/18</div>';
  html += `<div class="slot" style="flex:8">${bracketMatchBox(third, 0)}</div>`;
  html += '<div style="flex:3"></div>';
  html += '</div>';

  html += '</div>';

  // ── 半区指示 ──
  html += '<div style="display:flex;justify-content:center;gap:40px;padding:8px 0 16px;flex-wrap:wrap">';
  html += '<span style="color:var(--accent);font-size:0.8rem">⬆ 上半区 (左)</span>';
  html += '<span style="color:var(--yellow);font-size:0.8rem">⬇ 下半区 (右)</span>';
  html += '</div>';

  document.getElementById('bracketContent').innerHTML = html;
}

function renderConnectorCol(count) {
  let h = '<div class="connectors">';
  for (let i = 0; i < count; i++) {
    h += '<div class="conn-group" style="flex:' + (16/count) + '"></div>';
  }
  h += '</div>';
  return h;
}

function renderStats() {
  const done = R32.filter(m => !!m.score);
  const todo = R32.filter(m => !m.score);
  const allWinners = done.map(m => getWinner(m)).filter(Boolean);

  // 总进球
  let totalGoals = 0;
  done.forEach(m => {
    const [h,a] = getScoreParts(m);
    if (h!==null && a!==null) totalGoals += h + a;
  });

  // 冷门: 低排名球队击败高排名球队 (排名数字大=排名低)
  const upsets = [];
  done.forEach(m => {
    const w = getWinner(m);
    const l = getLoser(m);
    if (!w || !l) return;
    const rW = FIFA_RANK[w] || 999;
    const rL = FIFA_RANK[l] || 999;
    if (rW > rL) upsets.push({ winner:w, loser:l, wRank:rW, lRank:rL, match:m });
  });

  // 进球最多的球队
  const teamGoals = {};
  done.forEach(m => {
    const [h,a] = getScoreParts(m);
    if (h!==null && a!==null) {
      teamGoals[m.home] = (teamGoals[m.home]||0) + h;
      teamGoals[m.away] = (teamGoals[m.away]||0) + a;
    }
  });
  const topScorers = Object.entries(teamGoals).sort((a,b) => b[1]-a[1]).slice(0,5);

  // 接下来最值得关注的比赛 (半决赛)
  const keyMatches = [];
  const qfWinners = [];
  for (let idx = 0; idx < 4; idx++) {
    const res = QF_RESULTS[idx];
    qfWinners[idx] = (res && res.winner) ? res.winner : null;
  }
  const SF_P = [[0,1],[2,3]];
  SF_P.forEach(([i,j], sfIdx) => {
    if (qfWinners[i] && qfWinners[j]) {
      const sched = KNOCKOUT.sf[sfIdx];
      const p = predict(qfWinners[i], qfWinners[j]);
      keyMatches.push({ match: {home:qfWinners[i], away:qfWinners[j], date:sched.date, time:sched.time}, pred:p });
    }
  });
  // Also keep r16W for QF section below
  const r16W = [];
  for (let idx = 0; idx < 8; idx++) {
    const res = R16_RESULTS[idx];
    r16W[idx] = (res && res.winner) ? res.winner : null;
  }

  let html = '';

  // ── 统计卡片 ──
  html += '<div class="stats-grid">';
  html += `<div class="stat-card"><div class="stat-icon">⚽</div><div class="stat-value">${totalGoals}</div><div class="stat-label">总进球数 (${done.length}场)</div></div>`;
  html += `<div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-value">${(totalGoals/done.length||0).toFixed(1)}</div><div class="stat-label">场均进球</div></div>`;
  const r16Completed = Object.keys(R16_RESULTS).length;
  const qfCompleted = Object.keys(QF_RESULTS).length;
  html += `<div class="stat-card"><div class="stat-icon">🏟️</div><div class="stat-value">16/16</div><div class="stat-label">32强已完赛</div></div>`;
  html += `<div class="stat-card highlight"><div class="stat-icon">⚡</div><div class="stat-value">${upsets.length}</div><div class="stat-label">冷门场次</div></div>`;
  html += `<div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-value">${r16Completed}/8</div><div class="stat-label">16强已完赛</div></div>`;
  html += `<div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-value">4/4</div><div class="stat-label">¼决赛已完赛</div></div>`;
  html += `<div class="stat-card highlight"><div class="stat-icon">🌟</div><div class="stat-value">4</div><div class="stat-label">已晋级半决赛</div></div>`;
  html += '</div>';

  // ── 已晋级球队 ──
  html += '<div class="section-title">🏆 已晋级16强球队</div>';
  html += '<div class="team-mini-list">';
  for (const w of allWinners) {
    html += `<span class="team-mini">${FLAGS[w]||'🌍'} ${w} <span style="color:var(--dim);font-size:0.7rem">#${FIFA_RANK[w]||'?'}</span></span>`;
  }
  html += '</div>';

  // ── 冷门 ──
  if (upsets.length > 0) {
    html += '<div class="section-title" style="margin-top:20px">⚡ 冷门预警</div>';
    html += '<div class="insight-list">';
    for (const u of upsets) {
      html += `<div class="insight-item upset">
        <div class="ins-icon">📉</div>
        <div class="ins-body">
          <div class="ins-title">${FLAGS[u.winner]||''} ${u.winner} (FIFA #${u.wRank}) 击败 ${FLAGS[u.loser]||''} ${u.loser} (FIFA #${u.lRank})</div>
          <div class="ins-desc">排名差距: ${u.wRank - u.lRank} 位 · ${u.match.score} · ${u.match.venue}</div>
        </div></div>`;
    }
    html += '</div>';
  }

  // ── 火力榜 ──
  html += '<div class="section-title" style="margin-top:20px">🔥 进球最多</div>';
  html += '<div class="team-mini-list">';
  for (const [team, goals] of topScorers) {
    html += `<span class="team-mini">${FLAGS[team]||'🌍'} ${team} <span style="color:var(--accent);font-weight:700">${goals}球</span></span>`;
  }
  html += '</div>';

  // ── 关键前瞻 ──
  if (keyMatches.length > 0) {
    html += '<div class="section-title" style="margin-top:20px">🔮 焦点战前瞻</div>';
    html += '<div class="insight-list">';
    for (const {match:m, pred:p} of keyMatches) {
      const fav = parseFloat(p.wp) > parseFloat(p.lp) ? m.home : m.away;
      const favPct = Math.max(parseFloat(p.wp), parseFloat(p.lp));
      html += `<div class="insight-item highlight-ins">
        <div class="ins-icon">🤜</div>
        <div class="ins-body">
          <div class="ins-title">${FLAGS[m.home]||''} ${m.home} vs ${FLAGS[m.away]||''} ${m.away}</div>
          <div class="ins-desc">🕐 ${m.date} ${m.time} · ${fav} 胜率 ${favPct}% · xG ${p.xgH}-${p.xgA} · ${p.verdict.text}</div>
        </div></div>`;
    }
    html += '</div>';
  }

  // ── R16 预览 ──
  const r16Ready = [];
  const r16Done = [];
  const R16_P2 = [[0,2],[1,5],[3,4],[6,7],[10,11],[8,9],[14,13],[12,15]];
  R16_P2.forEach(([i,j], idx) => {
    const h = getWinner(R32[i]), a = getWinner(R32[j]);
    const result = R16_RESULTS[idx];
    if (h && a) {
      if (result && result.winner) {
        r16Done.push({home:h, away:a, idx, sched:KNOCKOUT.r16[idx], result});
      } else {
        r16Ready.push({home:h, away:a, idx, sched:KNOCKOUT.r16[idx]});
      }
    }
  });
  // ── R16 战报 ──
  if (r16Done.length > 0) {
    html += '<div class="section-title" style="margin-top:20px">✅ 16强已完赛</div>';
    html += '<div class="insight-list">';
    for (const r of r16Done) {
      const winnerFlag = FLAGS[r.result.winner] || '🏆';
      html += `<div class="insight-item upset" style="border-left-color:var(--green)">
        <div class="ins-icon">🏟️</div>
        <div class="ins-body">
          <div class="ins-title">${winnerFlag} ${r.result.winner} 晋级！ ${FLAGS[r.home]||''} ${r.home} ${r.result.score} ${FLAGS[r.away]||''} ${r.away}</div>
          <div class="ins-desc">${r.sched.id} · ${r.sched.date} · ${r.sched.venue}</div>
        </div></div>`;
    }
    html += '</div>';
  }

  if (r16Ready.length > 0) {
    html += '<div class="section-title" style="margin-top:20px">🔮 16强即将开赛</div>';
    html += '<div class="insight-list">';
    for (const r of r16Ready) {
      const p = predict(r.home, r.away);
      html += `<div class="insight-item highlight-ins">
        <div class="ins-icon">⚔️</div>
        <div class="ins-body">
          <div class="ins-title">${FLAGS[r.home]||''} ${r.home} vs ${FLAGS[r.away]||''} ${r.away}</div>
          <div class="ins-desc">${r.sched.id} · 🕐 ${r.sched.date} ${r.sched.time} · ${r.sched.venue} · 预测: ${p.verdict.text}</div>
        </div></div>`;
    }
    html += '</div>';
  }

  // ── ¼决赛 ──
  const qfDone = [], qfUpcoming = [];
  const QF_P3 = [[0,1],[2,3],[4,5],[6,7]];
  QF_P3.forEach(([i,j], qfIdx) => {
    if (r16W[i] && r16W[j]) {
      const res = QF_RESULTS[qfIdx];
      if (res && res.winner) {
        qfDone.push({home: r16W[i], away: r16W[j], sched: KNOCKOUT.qf[qfIdx], result: res});
      } else {
        qfUpcoming.push({home: r16W[i], away: r16W[j], sched: KNOCKOUT.qf[qfIdx]});
      }
    }
  });

  if (qfDone.length > 0) {
    html += '<div class="section-title" style="margin-top:20px">✅ ¼决赛已完赛</div>';
    html += '<div class="insight-list">';
    for (const q of qfDone) {
      const wf = FLAGS[q.result.winner] || '🏆';
      html += `<div class="insight-item upset" style="border-left-color:var(--green)">
        <div class="ins-icon">🏟️</div>
        <div class="ins-body">
          <div class="ins-title">${wf} ${q.result.winner} 晋级半决赛！ ${FLAGS[q.home]||''} ${q.home} ${q.result.score} ${FLAGS[q.away]||''} ${q.away}</div>
          <div class="ins-desc">${q.sched.id} · ${q.sched.date} · ${q.sched.venue}</div>
        </div></div>`;
    }
    html += '</div>';
  }

  if (qfUpcoming.length > 0) {
    html += '<div class="section-title" style="margin-top:20px">🔮 ¼决赛即将开赛</div>';
    html += '<div class="insight-list">';
    for (const q of qfUpcoming) {
      const p = predict(q.home, q.away);
      html += `<div class="insight-item highlight-ins">
        <div class="ins-icon">⚔️</div>
        <div class="ins-body">
          <div class="ins-title">${FLAGS[q.home]||''} ${q.home} vs ${FLAGS[q.away]||''} ${q.away}</div>
          <div class="ins-desc">${q.sched.id} · 🕐 ${q.sched.date} ${q.sched.time} · ${q.sched.venue} · 预测: ${p.verdict.text}</div>
        </div></div>`;
    }
    html += '</div>';
  }

  // ── 半决赛 ──
  const sfConfirmed = [];
  const qfW = [];
  for (let idx = 0; idx < 4; idx++) {
    const res = QF_RESULTS[idx];
    qfW[idx] = (res && res.winner) ? res.winner : null;
  }
  const SF_P2 = [[0,1],[2,3]];
  SF_P2.forEach(([i,j], sfIdx) => {
    if (qfW[i] && qfW[j]) {
      sfConfirmed.push({home: qfW[i], away: qfW[j], sched: KNOCKOUT.sf[sfIdx]});
    }
  });
  if (sfConfirmed.length > 0) {
    html += '<div class="section-title" style="margin-top:20px">🌟 半决赛对阵</div>';
    html += '<div class="insight-list">';
    for (const s of sfConfirmed) {
      const p = predict(s.home, s.away);
      html += `<div class="insight-item highlight-ins">
        <div class="ins-icon">🏟️</div>
        <div class="ins-body">
          <div class="ins-title">${FLAGS[s.home]||''} ${s.home} vs ${FLAGS[s.away]||''} ${s.away}</div>
          <div class="ins-desc">${s.sched.id} · 🕐 ${s.sched.date} ${s.sched.time} · ${s.sched.venue} · 预测: ${p.verdict.text}</div>
        </div></div>`;
    }
    html += '</div>';
  }

  document.getElementById('statsContent').innerHTML = html;
}

// ================================================================
// MODAL — 点击场次查看预测
// ================================================================
function openPrediction(home, away, id, time, venue, score) {
  if (home==='待定' || away==='待定') return;

  const fH = FLAGS[home]||'', fA = FLAGS[away]||'';

  // 已完赛
  if (score && score !== 'null') {
    let wHTML = '';
    try {
      const p = score.replace(/\(点.*?\)/g,'').trim().split('-');
      if (parseInt(p[0]) > parseInt(p[1])) wHTML = `<div style="color:var(--green);font-size:1.1rem;margin-top:8px">🏆 ${home} 获胜</div>`;
      else if (parseInt(p[1]) > parseInt(p[0])) wHTML = `<div style="color:var(--green);font-size:1.1rem;margin-top:8px">🏆 ${away} 获胜</div>`;
    } catch(e) {}
    document.getElementById('modalContent').innerHTML = `
      <button class="close" onclick="closeModal()">✕</button>
      <h3 style="text-align:center;color:var(--dim)">${id} · ${venue||''}</h3>
      <div class="m-teams">
        <div style="text-align:center"><div class="m-flag">${fH}</div><div class="m-name">${home}</div></div>
        <div class="m-vs">VS</div>
        <div style="text-align:center"><div class="m-flag">${fA}</div><div class="m-name">${away}</div></div>
      </div>
      <div class="m-meta">🕐 ${time||''} 北京时间</div>
      <div class="result-box"><div class="score">${score}</div>${wHTML}</div>
      <div style="text-align:center;color:var(--dim);font-size:0.8rem;margin-top:8px">✅ 已完赛</div>`;
    document.getElementById('modal').classList.add('show');
    return;
  }

  // 预测
  const p = predict(home, away);
  const ord = parseFloat(p.wp) >= parseFloat(p.lp)
    ? [{l:`${home} 获胜`,pct:p.wp,c:'bar-green'},{l:'平局',pct:p.dp,c:'bar-yellow'},{l:`${away} 获胜`,pct:p.lp,c:'bar-red'}]
    : [{l:`${home} 获胜`,pct:p.wp,c:'bar-red'},{l:'平局',pct:p.dp,c:'bar-yellow'},{l:`${away} 获胜`,pct:p.lp,c:'bar-green'}];
  const chips = p.top3.map((x,i)=>`<span class="score-chip${i===0?' star':''}">${x.s} <span style="color:var(--dim);font-size:0.7rem">${x.p}%</span></span>`).join('');

  document.getElementById('modalContent').innerHTML = `
    <button class="close" onclick="closeModal()">✕</button>
    <h3 style="text-align:center;color:var(--dim)">${id} · ${venue||''}</h3>
    <div class="m-teams">
      <div style="text-align:center"><div class="m-flag">${fH}</div><div class="m-name">${home}</div><div class="m-rank">FIFA #${p.rH||'?'} · Elo ${p.eH}</div></div>
      <div class="m-vs">VS</div>
      <div style="text-align:center"><div class="m-flag">${fA}</div><div class="m-name">${away}</div><div class="m-rank">FIFA #${p.rA||'?'} · Elo ${p.eA}</div></div>
    </div>
    <div class="m-meta">🕐 ${time||''} 北京时间 · Elo差 ${p.eDiff>0?'+':''}${p.eDiff}</div>
    <div class="prob-section" style="margin-top:12px">
      <div style="font-size:0.85rem;color:var(--dim);margin-bottom:6px">📈 胜平负概率 (90分钟)</div>
      ${ord.map(b=>renderProbBar(b.l,b.pct,b.c)).join('')}
    </div>
    <div class="xg-row"><div>${home}<br><span class="xg-val">${p.xgH}</span></div><div style="align-self:center;color:var(--dim);font-size:0.8rem">xG<br>总≈${p.totalXg}</div><div>${away}<br><span class="xg-val">${p.xgA}</span></div></div>
    <div class="top-scores"><span style="color:var(--dim);font-size:0.8rem;align-self:center">🎯 最可能比分:</span>${chips}</div>
    <div class="verdict ${p.verdict.cls}" style="margin-top:12px">${p.verdict.text}</div>`;
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

// ================================================================
// INIT
// ================================================================
try {
  const params = new URLSearchParams(window.location.search);
  const initDate = params.get('date') || bjToday();
  loadDaily(initDate);
  renderBracket();
  renderStats();
} catch(e) {
  document.getElementById('dailyContent').innerHTML = '<div style="text-align:center;padding:20px;color:var(--red)">❌ 加载错误: ' + e.message + '<br><pre style="font-size:0.75rem">' + e.stack + '</pre></div>';
}
</script>
